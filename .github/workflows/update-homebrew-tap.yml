name: Update Homebrew Tap

on:
  # Trigger when the Release workflow completes successfully.
  # NOTE: no `branches` filter here — the Release workflow is triggered by a
  # tag push (refs/tags/vX.Y.Z), so its head_branch is the tag name, never
  # `main`. A `branches: [main]` filter would (and previously did) silently
  # block this trigger from ever firing on a release.
  workflow_run:
    workflows: ["Release"]
    types: [completed]

  # Allow manual trigger with a version override
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.0)"
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-22.04
    # Only run if the release succeeded (or if manually triggered).
    # `workflow_run.event == 'push'` restricts auto-runs to tag pushes — the
    # Release workflow's only `push` trigger is `push: tags:` — so PR-triggered
    # Release completions (cargo-dist's `plan` job) don't fire a tap update.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # Get the latest release tag
            TAG=$(gh release view --repo lightonai/next-plaid --json tagName -q '.tagName')
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Updating Homebrew tap for ${TAG} (version ${VERSION})"

      - name: Fetch SHAs
        id: shas
        run: |
          REPO="lightonai/next-plaid"
          TAG="${{ steps.tag.outputs.tag }}"

          # Binary SHAs from release .sha256 files
          AARCH64_DARWIN_SHA=$(gh release download "${TAG}" --repo "${REPO}" -p "colgrep-aarch64-apple-darwin.tar.xz.sha256" -O - | awk '{print $1}')
          X86_64_DARWIN_SHA=$(gh release download "${TAG}" --repo "${REPO}" -p "colgrep-x86_64-apple-darwin.tar.xz.sha256" -O - | awk '{print $1}')
          X86_64_LINUX_SHA=$(gh release download "${TAG}" --repo "${REPO}" -p "colgrep-x86_64-unknown-linux-gnu.tar.xz.sha256" -O - | awk '{print $1}')

          echo "aarch64_darwin=${AARCH64_DARWIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_64_darwin=${X86_64_DARWIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=${X86_64_LINUX_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: lightonai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate formula
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          AARCH64_DARWIN_SHA: ${{ steps.shas.outputs.aarch64_darwin }}
          X86_64_DARWIN_SHA: ${{ steps.shas.outputs.x86_64_darwin }}
          X86_64_LINUX_SHA: ${{ steps.shas.outputs.x86_64_linux }}
        run: |
          REPO="lightonai/next-plaid"
          cat > Formula/colgrep.rb <<RUBY
          class Colgrep < Formula
            desc "Semantic code search powered by ColBERT"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/v${VERSION}/colgrep-aarch64-apple-darwin.tar.xz"
                sha256 "${AARCH64_DARWIN_SHA}"
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/v${VERSION}/colgrep-x86_64-apple-darwin.tar.xz"
                sha256 "${X86_64_DARWIN_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${REPO}/releases/download/v${VERSION}/colgrep-x86_64-unknown-linux-gnu.tar.xz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "colgrep"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/colgrep --version")
            end
          end
          RUBY

          # Fix indentation (heredoc adds 10 spaces of leading whitespace)
          sed -i 's/^          //' Formula/colgrep.rb

      - name: Commit and push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lightonai/homebrew-tap.git"
          git add Formula/colgrep.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update colgrep to ${{ steps.tag.outputs.version }}"
          git push
